<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-title>Mi Fisioterapia</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-item lines="none" class="ion-margin-bottom" *ngIf="user">
    <ion-avatar slot="start">
      <img src="https://ionicframework.com/docs/img/demos/avatar.svg" />
    </ion-avatar>
    <ion-label>
      <p class="ion-no-margin">Buen día,</p>
      <h2 class="ion-no-margin"><b>¡Hola, {{ user.fullName }}!</b></h2>
    </ion-label>
  </ion-item>

  <ion-card class="ion-no-margin shadow-card" *ngIf="user">
    <ion-card-content>
      <ion-label><b>Tu progreso hoy</b></ion-label>
      <h2 class="ion-text-end ion-no-margin" color="primary"><b>{{ user.progress * 100 }}%</b></h2>
      <ion-progress-bar [value]="user.progress" color="success" class="ion-margin-top"></ion-progress-bar>
    </ion-card-content>
  </ion-card>

  <ion-card class="ion-margin-top shadow-card" *ngIf="user">
    <ion-item lines="none">
      <ion-avatar slot="start">
        <img src="https://i.pravatar.cc/150?u=doctor" />
      </ion-avatar>
      <ion-label>
        <h3><b>{{ user.specialist }}</b></h3>
        <p>{{ user.therapyType }}</p>
        <p><ion-icon name="calendar-outline"></ion-icon> {{ user.nextAppointment }}</p>
      </ion-label>
    </ion-item>
  </ion-card>

  <ion-card class="ion-margin-top routine-card">
    <ion-card-content class="ion-text-center">
      <h3><b>Tu rutina personalizada</b></h3>
      <p>Continúa con tu meta de hoy.</p>
      <ion-button expand="block" shape="round" color="warning" class="ion-margin-top">
        EMPEZAR RUTINA
      </ion-button>
    </ion-card-content>
  </ion-card>

  <ion-list-header>
    <ion-label>ACTIVIDAD SEMANAL</ion-label>
  </ion-list-header>
  <ion-grid>
    <ion-row class="ion-text-center">
      <ion-col *ngFor="let dia of ['L', 'M', 'M', 'J', 'V', 'S', 'D']">
        <ion-badge color="light" mode="ios">{{ dia }}</ion-badge>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
