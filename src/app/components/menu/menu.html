<div class="flex h-screen w-full bg-activa-main relative overflow-hidden">

  <div *ngIf="isMobileMenuOpen" 
       class="fixed top-0 left-0 w-full h-full bg-black-alpha-40 z-4 md:hidden transition-all"
       (click)="closeMenu()"></div>

  <div [ngClass]="isMobileMenuOpen ? 'flex fixed h-full z-5 shadow-4 w-16rem' : (isDesktopCollapsed ? 'hidden md:flex w-5rem' : 'hidden md:flex w-16rem')"
       class="bg-activa-surface flex-column justify-content-between transition-all duration-300 md:relative md:shadow-none border-right-1 h-full" 
       style="border-color: #E2E8F0 !important;"> 
    
    <div class="p-4 flex justify-content-between align-items-center border-bottom-1" style="border-color: #E2E8F0 !important; height: 4rem;">
      <div class="flex align-items-center gap-3" [ngClass]="(isDesktopCollapsed && !isMobileMenuOpen) ? 'mx-auto' : ''">
        <div class="bg-activa-primary text-white border-round-sm p-1 flex align-items-center justify-content-center flex-shrink-0" style="width: 32px; height: 32px;">
          <span class="font-bold">A</span>
        </div>
        <span *ngIf="!isDesktopCollapsed || isMobileMenuOpen" class="text-xl font-bold text-color tracking-wide fadein">ACTIVA</span>
      </div>
      
      <i *ngIf="!isDesktopCollapsed" class="pi pi-bars text-color-secondary text-xl cursor-pointer hidden md:block hover:text-activa-primary transition-colors" (click)="toggleMenu()"></i>
      <i class="pi pi-times text-color-secondary text-xl cursor-pointer md:hidden hover:text-color" (click)="closeMenu()"></i>
    </div>

    <div class="flex-1 py-4 flex flex-column gap-2 overflow-y-auto" [ngClass]="(isDesktopCollapsed && !isMobileMenuOpen) ? 'px-2' : 'px-3'">
      <div *ngIf="isDesktopCollapsed && !isMobileMenuOpen" class="flex justify-content-center mb-3 hidden md:flex">
         <i class="pi pi-bars text-color-secondary text-xl cursor-pointer hover:text-activa-primary transition-colors" (click)="toggleMenu()"></i>
      </div>

      <a routerLink="/dashboard/inicio" routerLinkActive #rlaInicio="routerLinkActive" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()" 
         [ngClass]="(isDesktopCollapsed && !isMobileMenuOpen) ? 'justify-content-center' : 'gap-3'"
         class="flex align-items-center p-3 border-round-md cursor-pointer no-underline transition-colors"
         [class.bg-activa-primary-light]="rlaInicio.isActive"
         [class.text-activa-primary]="rlaInicio.isActive"
         [class.text-color-secondary]="!rlaInicio.isActive"
         [class.hover:surface-hover]="!rlaInicio.isActive">
        <i class="pi pi-home text-lg" [class.font-bold]="rlaInicio.isActive"></i>
        <span *ngIf="!isDesktopCollapsed || isMobileMenuOpen" class="text-sm fadein" [class.font-bold]="rlaInicio.isActive" [class.font-medium]="!rlaInicio.isActive">Inicio</span>
      </a>
      
      <a routerLink="/dashboard/pacientes" routerLinkActive #rlaPacientes="routerLinkActive" (click)="closeMenu()" 
         [ngClass]="(isDesktopCollapsed && !isMobileMenuOpen) ? 'justify-content-center' : 'gap-3'"
         class="flex align-items-center p-3 border-round-md cursor-pointer no-underline transition-colors"
         [class.bg-activa-primary-light]="rlaPacientes.isActive"
         [class.text-activa-primary]="rlaPacientes.isActive"
         [class.text-color-secondary]="!rlaPacientes.isActive"
         [class.hover:surface-hover]="!rlaPacientes.isActive">
        <i class="pi pi-users text-lg" [class.font-bold]="rlaPacientes.isActive"></i>
        <span *ngIf="!isDesktopCollapsed || isMobileMenuOpen" class="text-sm fadein" [class.font-bold]="rlaPacientes.isActive" [class.font-medium]="!rlaPacientes.isActive">Pacientes</span>
      </a>

      <a routerLink="/dashboard/citas" routerLinkActive #rlaCitas="routerLinkActive" (click)="closeMenu()" 
         [ngClass]="(isDesktopCollapsed && !isMobileMenuOpen) ? 'justify-content-center' : 'gap-3'"
         class="flex align-items-center p-3 border-round-md cursor-pointer no-underline transition-colors"
         [class.bg-activa-primary-light]="rlaCitas.isActive"
         [class.text-activa-primary]="rlaCitas.isActive"
         [class.text-color-secondary]="!rlaCitas.isActive"
         [class.hover:surface-hover]="!rlaCitas.isActive">
        <i class="pi pi-calendar text-lg" [class.font-bold]="rlaCitas.isActive"></i>
        <span *ngIf="!isDesktopCollapsed || isMobileMenuOpen" class="text-sm fadein" [class.font-bold]="rlaCitas.isActive" [class.font-medium]="!rlaCitas.isActive">Agenda</span>
      </a>

      <a routerLink="/dashboard/ejercicios" routerLinkActive #rlaEjercicios="routerLinkActive" (click)="closeMenu()" 
         [ngClass]="(isDesktopCollapsed && !isMobileMenuOpen) ? 'justify-content-center' : 'gap-3'"
         class="flex align-items-center p-3 border-round-md cursor-pointer no-underline transition-colors"
         [class.bg-activa-primary-light]="rlaEjercicios.isActive"
         [class.text-activa-primary]="rlaEjercicios.isActive"
         [class.text-color-secondary]="!rlaEjercicios.isActive"
         [class.hover:surface-hover]="!rlaEjercicios.isActive">
        <i class="pi pi-bolt text-lg" [class.font-bold]="rlaEjercicios.isActive"></i>
        <span *ngIf="!isDesktopCollapsed || isMobileMenuOpen" class="text-sm fadein" [class.font-bold]="rlaEjercicios.isActive" [class.font-medium]="!rlaEjercicios.isActive">Ejercicios</span>
      </a>
    </div>

    <div class="p-3 border-top-1 overflow-hidden flex-shrink-0" style="border-color: #E2E8F0 !important;">
      <div class="flex align-items-center p-2 border-round-md hover:surface-hover cursor-pointer transition-colors"
           [ngClass]="(isDesktopCollapsed && !isMobileMenuOpen) ? 'justify-content-center' : 'gap-3'">
        <div class="bg-activa-main border-circle flex align-items-center justify-content-center text-activa-primary flex-shrink-0" style="width: 35px; height: 35px;">
          <i class="pi pi-user text-xl"></i>
        </div>
        <div *ngIf="!isDesktopCollapsed || isMobileMenuOpen" class="flex flex-column fadein">
          <span class="font-medium text-sm text-color line-height-2 white-space-nowrap">Dr. Javier M.</span>
          <span class="text-xs text-color-secondary white-space-nowrap">Fisioterapeuta</span>
        </div>
      </div>
    </div>
  </div>

  <div class="flex-1 flex flex-column h-full overflow-hidden">
    
    <div class="bg-activa-surface h-4rem px-4 flex justify-content-between align-items-center border-bottom-1 z-1 flex-shrink-0" style="border-color: #E2E8F0 !important;">
      <div class="flex align-items-center gap-3">
        <p-button icon="pi pi-bars" styleClass="p-button-text p-button-secondary md:hidden" (onClick)="toggleMenu()"></p-button>
        <h2 class="m-0 text-xl font-semibold text-color hidden sm:block">Plataforma Clínica</h2>
      </div>
      
      <div class="flex align-items-center gap-4">
        <i class="pi pi-bell text-color-secondary text-xl cursor-pointer hover:text-activa-primary transition-colors relative">
          <span class="absolute top-0 right-0 bg-red-500 border-circle w-0.5rem h-0.5rem"></span>
        </i>
      </div>
    </div>

   <div class="flex-1 overflow-y-auto p-4 md:p-6 bg-activa-surface">
      <router-outlet></router-outlet>
    </div>

  </div>
</div>
