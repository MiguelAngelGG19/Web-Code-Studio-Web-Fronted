<div class="container">
  <div class="form-card">
    <h2>Agregar Nuevo Ejercicio</h2>

    <!-- Mensajes de éxito/error -->
    <div *ngIf="successMessage" class="alert alert-success">
      {{ successMessage }}
    </div>
    <div *ngIf="errorMessage" class="alert alert-danger">
      {{ errorMessage }}
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <!-- Nombre del ejercicio -->
      <div class="form-group">
        <label for="name">Nombre del Ejercicio *</label>
        <input
          id="name"
          type="text"
          class="form-control"
          formControlName="name"
          placeholder="Ej: Sentadilla, Flexiones..."
          [class.is-invalid]="name?.invalid && name?.touched"
        />
        <small *ngIf="name?.errors?.['required'] && name?.touched" class="text-danger">
          El nombre es obligatorio
        </small>
        <small *ngIf="name?.errors?.['minlength'] && name?.touched" class="text-danger">
          Mínimo 3 caracteres
        </small>
      </div>

      <!-- Zona del cuerpo -->
      <div class="form-group">
        <label for="bodyZone">Zona del Cuerpo *</label>
        <input
          id="bodyZone"
          type="text"
          class="form-control"
          formControlName="bodyZone"
          placeholder="Ej: Piernas, Pecho, Espalda..."
          [class.is-invalid]="bodyZone?.invalid && bodyZone?.touched"
        />
        <small *ngIf="bodyZone?.errors?.['required'] && bodyZone?.touched" class="text-danger">
          La zona del cuerpo es obligatoria
        </small>
        <small *ngIf="bodyZone?.errors?.['minlength'] && bodyZone?.touched" class="text-danger">
          Mínimo 2 caracteres
        </small>
      </div>

      <!-- Descripción -->
      <div class="form-group">
        <label for="description">Descripción *</label>
        <textarea
          id="description"
          class="form-control"
          formControlName="description"
          placeholder="Describe cómo realizar el ejercicio..."
          rows="4"
          [class.is-invalid]="description?.invalid && description?.touched"
        ></textarea>
        <small *ngIf="description?.errors?.['required'] && description?.touched" class="text-danger">
          La descripción es obligatoria
        </small>
        <small *ngIf="description?.errors?.['minlength'] && description?.touched" class="text-danger">
          Mínimo 10 caracteres
        </small>
      </div>

      <!-- URL del video -->
      <div class="form-group">
        <label for="videoUrl">URL del Video *</label>
        <input
          id="videoUrl"
          type="url"
          class="form-control"
          formControlName="videoUrl"
          placeholder="https://ejemplo.com/video"
          [class.is-invalid]="videoUrl?.invalid && videoUrl?.touched"
        />
        <small *ngIf="videoUrl?.errors?.['required'] && videoUrl?.touched" class="text-danger">
          La URL del video es obligatoria
        </small>
        <small *ngIf="videoUrl?.errors?.['pattern'] && videoUrl?.touched" class="text-danger">
          Debe ser una URL válida (http:// o https://)
        </small>
      </div>

      <!-- Botón submit -->
      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="form.invalid || loading"
      >
        {{ loading ? 'Guardando...' : 'Guardar Ejercicio' }}
      </button>
    </form>
  </div>
</div>
