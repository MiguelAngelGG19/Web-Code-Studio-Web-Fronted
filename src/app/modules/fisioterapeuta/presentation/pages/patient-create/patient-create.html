<div class="fadein">

  <div class="flex flex-column md:flex-row md:justify-content-between md:align-items-center mb-5 gap-4">
    <div class="flex align-items-center gap-3">
      <p-button icon="pi pi-arrow-left" routerLink="/dashboard/pacientes" styleClass="p-button-rounded p-button-text p-button-secondary bg-white border-1 surface-border hover:surface-hover transition-colors shadow-none" pTooltip="Volver a la agenda"></p-button>
      <div>
        <h1 class="text-3xl font-bold text-color m-0 mb-1">Registrar Paciente</h1>
        <p class="text-color-secondary m-0">Crea un nuevo expediente clínico.</p>
      </div>
    </div>
    
    <div class="flex gap-3">
      <p-button label="Cancelar" routerLink="/dashboard/pacientes" styleClass="bg-white text-color border-1 surface-border hover:surface-hover border-round-xl px-4 py-2 font-bold shadow-none"></p-button>
      <p-button label="Guardar Paciente" icon="pi pi-check" styleClass="bg-activa-primary border-none shadow-1 hover:bg-activa-primary-hover border-round-xl px-4 py-2 font-bold"></p-button>
    </div>
  </div>

  <div class="grid">
    
    <div class="col-12 lg:col-8 p-3">
      <div class="bg-white border-round-2xl border-1 surface-border p-4 md:p-5 shadow-none h-full">
        <h2 class="text-xl font-bold text-color mt-0 mb-4 border-bottom-1 surface-border pb-3">Información Personal</h2>
        
        <div class="formgrid grid">
          <div class="field col-12 md:col-6 mb-4">
            <label for="nombre" class="block font-bold text-color-secondary mb-2 text-sm">Nombre(s) *</label>
            <input id="nombre" type="text" pInputText class="w-full border-round-lg py-2 shadow-none" placeholder="Ej. Javier">
          </div>
          <div class="field col-12 md:col-6 mb-4">
            <label for="apellidos" class="block font-bold text-color-secondary mb-2 text-sm">Apellidos *</label>
            <input id="apellidos" type="text" pInputText class="w-full border-round-lg py-2 shadow-none" placeholder="Ej. Martínez">
          </div>
          
          <div class="field col-12 md:col-6 mb-4">
            <label for="telefono" class="block font-bold text-color-secondary mb-2 text-sm">Teléfono Móvil</label>
            <span class="p-input-icon-left w-full">
              <i class="pi pi-phone text-color-secondary"></i>
              <input id="telefono" type="tel" pInputText class="w-full border-round-lg py-2 shadow-none" placeholder="(555) 000-0000">
            </span>
          </div>
          <div class="field col-12 md:col-6 mb-4">
            <label for="email" class="block font-bold text-color-secondary mb-2 text-sm">Correo Electrónico</label>
            <span class="p-input-icon-left w-full">
              <i class="pi pi-envelope text-color-secondary"></i>
              <input id="email" type="email" pInputText class="w-full border-round-lg py-2 shadow-none" placeholder="correo@ejemplo.com">
            </span>
          </div>

          <div class="field col-12 md:col-6 mb-4">
            <label for="dob" class="block font-bold text-color-secondary mb-2 text-sm">Fecha de Nacimiento</label>
            <p-calendar id="dob" [showIcon]="true" placeholder="dd/mm/aaaa" styleClass="w-full" inputStyleClass="border-round-left-lg py-2 shadow-none"></p-calendar>
          </div>
          <div class="field col-12 md:col-6 mb-4">
            <label for="genero" class="block font-bold text-color-secondary mb-2 text-sm">Género</label>
            <p-dropdown id="genero" [options]="generos" placeholder="Selecciona una opción" styleClass="w-full border-round-lg shadow-none"></p-dropdown>
          </div>
        </div>
      </div>
    </div>

    <div class="col-12 lg:col-4 p-3">
      <div class="bg-white border-round-2xl border-1 surface-border p-4 md:p-5 shadow-none h-full">
        <h2 class="text-xl font-bold text-color mt-0 mb-4 border-bottom-1 surface-border pb-3">Perfil Clínico</h2>

        <div class="field mb-4">
          <label for="estado" class="block font-bold text-color-secondary mb-2 text-sm">Etiqueta Inicial</label>
          <p-dropdown id="estado" [options]="estados" placeholder="Ej. Nueva Consulta" styleClass="w-full border-round-lg shadow-none"></p-dropdown>
        </div>

        <div class="field mb-4">
          <label for="motivo" class="block font-bold text-color-secondary mb-2 text-sm">Motivo Principal</label>
          <input id="motivo" type="text" pInputText class="w-full border-round-lg py-2 shadow-none" placeholder="Ej. Dolor de Hombro">
        </div>

        <div class="field mb-4">
          <label for="notas" class="block font-bold text-color-secondary mb-2 text-sm">Notas Previas / Diagnóstico</label>
          <textarea id="notas" pInputTextarea rows="5" class="w-full border-round-lg shadow-none resize-none" placeholder="Describe brevemente el cuadro clínico inicial..."></textarea>
        </div>
        
      </div>
    </div>

  </div>
</div>
